spring:
  application:
    name: edunova-service

  datasource:
    # Replace with your actual Neon connection string
    url: ${db_url}
#    username: <ReplaceUserName>
#    password: <ReplacePassword>
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
#      ddl-auto: update # Use 'none' for production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username:  ${MAIL_USER}
    password:  ${MAIL_PASS}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# ── Server ────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# ── JWT ───────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000         # 15 minutes
    refresh-token-expiry-ms: 604800000     # 7 days
    set-password-token-expiry-ms: 7200000     # 2 hr
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:tech.insights15@gmail.com}
    from-name: "EduNova Platform"


logging:
  level:
    org:
      springframework:
        security: DEBUG

